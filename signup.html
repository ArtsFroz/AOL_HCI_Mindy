<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindy — Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background: #F7F9FC;
      overflow-y: auto;
    }

    .auth-hero {
      background: #fff;
      border-bottom-left-radius: 32px;
      border-bottom-right-radius: 32px;
      padding: 52px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .auth-pip {
      animation: pipBob 4s ease-in-out infinite;
    }

    .auth-pip img {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }

    .auth-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-dark);
      font-family: var(--font-head);
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-light);
      text-align: center;
      line-height: 1.6;
    }

    .auth-form {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
      font-family: var(--font-head);
    }

    .field-label.error { color: var(--danger); }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      gap: 10px;
      transition: border-color .2s;
    }

    .input-wrap:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91,143,168,0.12);
    }

    .input-wrap.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(224,112,112,0.12);
    }

    .input-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: var(--font-main);
      color: var(--text-dark);
      background: transparent;
    }

    .input-wrap input::placeholder { color: var(--text-light); }

    .toggle-pw {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .field-error {
      font-size: 12px;
      color: var(--danger);
      display: none;
      align-items: center;
      gap: 4px;
    }

    .field-error.show { display: flex; }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
    }

    .or-divider .line { flex: 1; height: 1px; background: var(--border); }

    .or-divider span {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .social-btns {
      display: flex;
      gap: 12px;
      padding: 0 24px;
      margin-top: 16px;
    }

    .btn-social {
      flex: 1;
      padding: 13px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
      cursor: pointer;
      font-family: var(--font-main);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .2s;
    }

    .btn-social:active { transform: scale(0.98); }

    .auth-footer {
      text-align: center;
      font-size: 14px;
      color: var(--text-light);
      padding: 20px 24px 40px;
    }

    .auth-footer a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="auth-screen">

      <!-- Hero -->
      <div class="auth-hero">
        <div class="auth-pip">
          <img src="assets/icons/pip-splash.svg" alt="Pip" />
        </div>
        <div class="auth-title">Join Mindy</div>
        <div class="auth-subtitle">Start your journey to a calmer,<br>clearer mind today.</div>
      </div>

      <!-- Form -->
      <div class="auth-form">

        <!-- Full Name -->
        <div class="field-wrap">
          <div class="field-label" id="label-name">Full Name</div>
          <div class="input-wrap" id="wrap-name">
            <span class="input-icon">
              <img src="assets/icons/icon-user.svg" width="16" height="16" alt="user" style="opacity:0.4;" />
            </span>
            <input type="text" id="input-name" placeholder="John Doe" oninput="clearError('name')" />
          </div>
          <div class="field-error" id="error-name">
            <span>⚠️</span> This information is required to proceed.
          </div>
        </div>

        <!-- Email -->
        <div class="field-wrap">
          <div class="field-label" id="label-email">Email Address</div>
          <div class="input-wrap" id="wrap-email">
            <span class="input-icon">
              <img src="assets/icons/icon-email.svg" width="16" height="16" alt="email" style="opacity:0.4;" />
            </span>
            <input type="email" id="input-email" placeholder="name@example.com" oninput="clearError('email')" />
          </div>
          <div class="field-error" id="error-email">
            <span>⚠️</span> Please enter a valid email address.
          </div>
        </div>

        <!-- Password -->
        <div class="field-wrap">
          <div class="field-label" id="label-password">Password</div>
          <div class="input-wrap" id="wrap-password">
            <span class="input-icon">
              <img src="assets/icons/icon-lock.svg" width="16" height="16" alt="lock" style="opacity:0.4;" />
            </span>
            <input type="password" id="input-password" placeholder="Create a strong password" oninput="clearError('password')" />
            <button class="toggle-pw" onclick="togglePassword()" id="toggle-pw">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9AA7B5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <div class="field-error" id="error-password">
            <span>⚠️</span> Password must be at least 6 characters.
          </div>
        </div>

        <!-- Sign Up Button -->
        <button class="btn btn-primary" onclick="doSignUp()">Sign Up</button>

      </div>

      <!-- OR -->
      <div class="or-divider">
        <div class="line"></div>
        <span>or continue with</span>
        <div class="line"></div>
      </div>

      <!-- Social -->
      <div class="social-btns">
        <button class="btn-social" onclick="doSignUp()">
          <img src="assets/icons/icon-google.svg" width="18" height="18" alt="Google" /> Google
        </button>
        <button class="btn-social" onclick="doSignUp()">
          <img src="assets/icons/icon-apple.svg" width="18" height="18" alt="Apple" style="filter:brightness(0);" /> Apple
        </button>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        Already have an account? <a href="login.html">Log In</a>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    if (Storage.get('mindyUser')) window.location.href = 'home.html';

    const EYE_OPEN = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5B8FA8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const EYE_CLOSED = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9AA7B5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    function togglePassword() {
      const input = document.getElementById('input-password');
      const btn   = document.getElementById('toggle-pw');
      const isHidden = input.type === 'password';
      input.type   = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden ? EYE_OPEN : EYE_CLOSED;
    }

    function showError(field) {
      document.getElementById('wrap-'  + field).classList.add('error');
      document.getElementById('label-' + field).classList.add('error');
      document.getElementById('error-' + field).classList.add('show');
    }

    function clearError(field) {
      document.getElementById('wrap-'  + field).classList.remove('error');
      document.getElementById('label-' + field).classList.remove('error');
      document.getElementById('error-' + field).classList.remove('show');
    }

    function doSignUp() {
      const name     = document.getElementById('input-name').value.trim();
      const email    = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;
      let valid = true;

      if (!name)                        { showError('name');     valid = false; }
      if (!email || !email.includes('@')){ showError('email');    valid = false; }
      if (password.length < 6)          { showError('password'); valid = false; }
      if (!valid) return;

      const joined = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      Storage.set('mindyUser', { name, email, joined });
      saveProfile({ name, joined });
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>
