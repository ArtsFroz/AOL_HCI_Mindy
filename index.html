<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5B8FA8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mindy" />
  <link rel="apple-touch-icon" href="assets/icons/pip-splash.svg" />

  <title>Mindy</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: linear-gradient(160deg, #5B8FA8 0%, #4a7a93 100%);
    }

    .splash {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: linear-gradient(160deg, #5B8FA8 0%, #4a7a93 100%);
      position: relative;
    }

    .splash-logo {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: rgba(255,255,255,0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255,255,255,0.3);
        backdrop-filter: blur(8px);
        animation: pulse 2.5s ease-in-out infinite;
        overflow: hidden;
    }

    .splash-name {
      margin-top: 20px;
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      font-family: var(--font-head);
      letter-spacing: 1px;
      animation: fadeUp 0.8s ease 0.3s both;
    }

    .splash-tagline {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.5px;
      animation: fadeUp 0.8s ease 0.6s both;
    }

    .splash-dots {
      position: absolute;
      bottom: 60px;
      display: flex;
      gap: 8px;
      animation: fadeUp 0.8s ease 1s both;
    }

    .splash-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }

    .splash-dots span:nth-child(1) { animation: pulse 1.2s ease 0s infinite; }
    .splash-dots span:nth-child(2) { animation: pulse 1.2s ease 0.2s infinite; }
    .splash-dots span:nth-child(3) { animation: pulse 1.2s ease 0.4s infinite; }
  </style>
</head>
<body>
  <div class="app">
    <div class="splash">
      <div class="splash-logo">
        <img src="assets/icons/pip-splash.svg" width="80" height="80" alt="Pip" style="border-radius:50%;" />
      </div>
      <div class="splash-name">Mindy</div>
      <div class="splash-tagline">Because Your Mind Matters</div>
      <div class="splash-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Auto redirect ke welcome setelah 2.8 detik
    setTimeout(() => {
      window.location.href = 'welcome.html';
    }, 2800);
  </script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('SW registered'))
        .catch((e) => console.log('SW error:', e));
    });
  }
  </script>
</body>
</html>
